name: Backend CI/CD

on:
  push:
    branches: [ main ]
    paths:
     - 'backend/**'
      - 'Server/**'
      - 'k8s/**'

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run tests
           working-directory: ./backend
          run: go test ./...

      - name: Build Docker image
       run: |
       docker build -t ${{ secrets.ECR_REPO_URI }}:${{ github.sha }} -f backend/Dockerfile ./backend

      - name: Vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.ECR_REPO_URI }}:${{ github.sha }}
          format: table
          exit-code: 0

      - name: Authenticate to AWS ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push image to ECR
        run: |
          docker push ${{ secrets.ECR_REPO_URI }}:${{ github.sha }}

      - name: Update Kubernetes deployment with new image tag
        run: |
          sed -i "s|image: .*|image: ${{ secrets.ECR_REPO_URI }}:${{ github.sha }}|g" k8s/deployment.yaml

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name starttech-cluster

      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s/

      - name: Rollout verification
        run: kubectl rollout status deployment/backend-api -n default
